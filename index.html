<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FitBase">
  <meta name="theme-color" content="#0d0d0d">
  <link rel="manifest" href="manifest.json">
  <title>FitBase 90</title>
  <style>
    :root {
      --accent: #C8FF00;
      --bg: #0d0d0d;
      --card: #161616;
      --border: #2a2a2a;
      --muted: #666;
      --white: #F0F0EC;
      --blue: #88ccff;
      --orange: #FF9F00;
      --red: #FF4D6D;
      --purple: #c084fc;
      --teal: #2dd4bf;
      --st: env(safe-area-inset-top, 0px);
      --sb: env(safe-area-inset-bottom, 0px);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--white);font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;}
    #app{height:100%;display:flex;flex-direction:column;}
    .sb{height:var(--st);background:var(--bg);flex-shrink:0;}
    .screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(66px + var(--sb));}
    .sh{padding:16px 16px 12px;position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:1px solid var(--border);}
    .sh-title{font-size:26px;font-weight:800;letter-spacing:-0.02em;}
    .sh-sub{font-size:12px;color:var(--muted);margin-top:2px;}
    .sb-body{padding:14px 14px 0;}
    .bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(13,13,13,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding-bottom:var(--sb);z-index:100;}
    .ni{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 0 7px;cursor:pointer;border:none;background:none;color:var(--muted);font-size:9px;letter-spacing:0.06em;text-transform:uppercase;font-weight:700;gap:3px;transition:color 0.15s;}
    .ni.on{color:var(--accent);}
    .ni svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;}
    .ct{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:11px;}
    .srow{display:flex;gap:10px;margin-bottom:12px;}
    .sc{flex:1;background:#1a1a1a;border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center;}
    .sn{font-size:22px;font-weight:800;line-height:1;color:var(--accent);}
    .sl{font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:0.07em;text-transform:uppercase;}
    .btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:14px;border-radius:10px;font-size:15px;font-weight:700;border:none;cursor:pointer;width:100%;margin-bottom:10px;-webkit-appearance:none;}
    .btn:active{opacity:0.7;}
    .btn-p{background:var(--accent);color:#000;}
    .btn-s{background:#1c1c1c;color:var(--white);border:1px solid var(--border);}
    .input{width:100%;background:#1c1c1c;border:1px solid var(--border);border-radius:10px;padding:13px 14px;font-size:16px;color:var(--white);outline:none;-webkit-appearance:none;}
    .input:focus{border-color:var(--accent);}
    .ilabel{font-size:11px;color:var(--muted);margin-bottom:6px;display:block;letter-spacing:0.06em;text-transform:uppercase;}
    .igroup{margin-bottom:14px;}
    .note{background:#1a1a1a;border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:11px 13px;font-size:13px;color:#ccc;margin-bottom:12px;line-height:1.6;}
    .exrow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
    .exrow:last-child{border-bottom:none;}
    .exn{font-size:13px;font-weight:500;line-height:1.3;}
    .exs{font-size:12px;color:var(--accent);font-weight:700;text-align:right;min-width:80px;}
    .slbl{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;font-weight:700;margin:12px 0 4px;}
    .wcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;}
    .wch{display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
    .wcb{display:none;margin-top:14px;}
    .wcard.open .wcb{display:block;}
    .wcard.open .ebtn{transform:rotate(45deg);}
    .ebtn{width:28px;height:28px;background:#222;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--accent);transition:transform 0.2s;flex-shrink:0;}
    .ptabs{display:flex;gap:8px;margin-bottom:14px;}
    .ptab{flex:1;padding:9px 5px;font-size:11px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:8px;text-align:center;transition:all 0.15s;line-height:1.3;}
    .stabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:14px;overflow-x:auto;scrollbar-width:none;}
    .stabs::-webkit-scrollbar{display:none;}
    .stab{padding:10px 14px;font-size:12px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;border:none;background:none;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.15s;}
    .stab.on{color:var(--accent);border-bottom-color:var(--accent);}
    .strbdg{display:inline-flex;align-items:center;gap:5px;background:rgba(200,255,0,0.1);border:1px solid rgba(200,255,0,0.25);border-radius:20px;padding:4px 11px;font-size:13px;font-weight:700;color:var(--accent);}
    .tcard{background:linear-gradient(135deg,#161616 0%,#1b200a 100%);border:1px solid rgba(200,255,0,0.2);border-radius:14px;padding:18px;margin-bottom:12px;}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(4px);}
    .msheet{background:#1a1a1a;border-radius:20px 20px 0 0;padding:20px 20px calc(20px + var(--sb));width:100%;border-top:1px solid var(--border);max-height:85vh;overflow-y:auto;}
    .mhandle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px;}
    .mtitle{font-size:20px;font-weight:800;margin-bottom:16px;}
    .lentry{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
    .lentry:last-child{border-bottom:none;}
    .pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;}
    .mitem{display:flex;justify-content:space-between;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--border);gap:12px;}
    .mitem:last-child{border-bottom:none;}
    .div{height:1px;background:var(--border);margin:12px 0;}
    .ob{display:flex;flex-direction:column;justify-content:center;min-height:100%;padding:40px 22px;}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .dayopt{background:#1a1a1a;border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:all 0.15s;}
    .dayopt.sel{border-color:var(--accent);background:rgba(200,255,0,0.08);}
    select.input{background:#1c1c1c;}
  </style>
</head>

];

// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
const S={
  d:{startDate:null,startWeight:null,weights:[],runs:[],workouts:[],mobility:[]},
  tab:'home',pp:0,mt:'daily',mr:'morning',modal:null,
  load(){const r=localStorage.getItem('fb90');if(r)try{this.d=JSON.parse(r);}catch(e){}},
  save(){localStorage.setItem('fb90',JSON.stringify(this.d));},
  get ok(){return!!this.d.startDate;},
  get dayN(){
    if(!this.d.startDate)return 0;
    const diff=Math.floor((new Date()-new Date(this.d.startDate))/86400000);
    return Math.max(1,Math.min(diff+1,90));
  },
  get phase(){const d=this.dayN;return d<=28?0:d<=56?1:2;},
  get week(){return Math.ceil(this.dayN/7);},
  get streak(){
    if(!this.d.workouts.length)return 0;
    const dates=[...new Set(this.d.workouts.map(w=>w.date))].sort().reverse();
    const today=td();const yest=new Date(Date.now()-86400000).toISOString().slice(0,10);
    if(dates[0]!==today&&dates[0]!==yest)return 0;
    let s=0;
    for(let i=0;i<dates.length;i++){
      const diff=Math.round((new Date(dates[0])-new Date(dates[i]))/86400000);
      if(diff===i)s++;else break;
    }
    return s;
  },
  get mobToday(){
    const t=td();return this.d.mobility.find(m=>m.date===t)||{date:t,morning:false,evening:false};
  },
  togMob(type){
    const t=td();let e=this.d.mobility.find(m=>m.date===t);
    if(!e){e={date:t,morning:false,evening:false};this.d.mobility.push(e);}
    e[type]=!e[type];this.save();
  },
  logW(w){
    const t=td();const i=this.d.weights.findIndex(x=>x.date===t);
    if(i>=0)this.d.weights[i].weight=w;else this.d.weights.push({date:t,weight:w});
    this.d.weights.sort((a,b)=>a.date.localeCompare(b.date));this.save();
  },
  logRun(dist,time,notes=''){this.d.runs.push({date:td(),distanceMi:dist,timeMin:time,notes});this.save();},
  logWorkout(dayId){this.d.workouts.push({date:td(),dayId,phaseN:this.phase+1});this.save();},
  setup(date,weight){
    this.d.startDate=date;this.d.startWeight=parseFloat(weight);
    this.d.weights=[{date,weight:parseFloat(weight)}];this.save();
  },
};

function td(){return new Date().toISOString().slice(0,10);}
function fmtDate(s){const d=new Date(s+'T12:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function pace(mi,min){if(!mi||!min)return'—';const p=min/mi;const m=Math.floor(p);const s=Math.round((p-m)*60);return`${m}:${s.toString().padStart(2,'0')}/mi`;}

// ─────────────────────────────────────────
// RENDER ENGINE
// ─────────────────────────────────────────
let selDay=null;

function render(){
  const app=document.getElementById('app');
  if(!S.ok){app.innerHTML=renderOB();bindOB();return;}
  app.innerHTML=`
    <div class="sb"></div>
    <div class="screen" id="scr">${renderScreen()}</div>
    ${renderNav()}
    ${S.modal?renderModal():''}
  `;
  bind();
}

function renderScreen(){
  switch(S.tab){
    case'home':return renderHome();
    case'plan':return renderPlan();
    case'mobility':return renderMobility();
    case'log':return renderLog();
    case'progress':return renderProgress();
  }
  return '';
}

// ─── PROGRESS ───
function renderProgress(){
  const ws=S.d.weights;
  const runs=S.d.runs;
  const startW=S.d.startWeight||215;
  const curW=ws.length?ws[ws.length-1].weight:startW;
  const lost=(startW-curW).toFixed(1);
  const goal=175;
  const pct=Math.min(100,Math.max(0,((startW-curW)/(startW-goal)*100))).toFixed(0);
  const dayPct=(S.dayN/90*100).toFixed(0);
  const mobDays=S.d.mobility.filter(m=>m.morning||m.evening).length;
  return`
    <div class="sh"><div class="sh-title">Progress</div><div class="sh-sub">Day ${S.dayN} of 90 · ${PHASES[S.phase].theme}</div></div>
    <div class="sb-body">
      <div class="srow">
        <div class="sc" style="border-color:#FF4D6D22;"><div class="sn" style="color:var(--red);">−${lost}</div><div class="sl">lbs lost</div></div>
        <div class="sc" style="border-color:rgba(200,255,0,0.15);"><div class="sn">${S.d.workouts.length}</div><div class="sl">workouts</div></div>
        <div class="sc" style="border-color:rgba(136,204,255,0.15);"><div class="sn" style="color:var(--blue);">${runs.length}</div><div class="sl">runs</div></div>
        <div class="sc" style="border-color:rgba(45,212,191,0.15);"><div class="sn" style="color:var(--teal);">${mobDays}</div><div class="sl">mob days</div></div>
      </div>
      <div class="card">
        <div class="ct">Weight Goal Progress</div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:6px;"><span>Start: ${startW} lbs</span><span>Goal: ${goal} lbs</span></div>
        <div style="background:#1a1a1a;border-radius:4px;height:8px;overflow:hidden;"><div style="background:var(--red);height:100%;width:${pct}%;border-radius:4px;transition:width 0.5s;"></div></div>
        <div style="font-size:12px;color:var(--muted);margin-top:6px;">Current: <strong style="color:var(--red);">${curW} lbs</strong> · ${pct}% to goal</div>
      </div>
      <div class="card">
        <div class="ct">90-Day Timeline</div>
        <div style="background:#1a1a1a;border-radius:4px;height:8px;overflow:hidden;margin-bottom:6px;"><div style="background:var(--accent);height:100%;width:${dayPct}%;border-radius:4px;"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);"><span>Day 1</span><span style="color:var(--accent);font-weight:700;">Day ${S.dayN}</span><span>Day 90</span></div>
      </div>
      ${ws.length>1?`<div class="card"><div class="ct">Weight Chart</div>${weightChart(ws)}</div>`:''}
      ${runs.length>0?`
        <div class="card">
          <div class="ct">Run History</div>
          ${runs.slice().reverse().slice(0,8).map(r=>`
            <div class="lentry">
              <div>
                <div style="font-size:13px;font-weight:600;">${r.distanceMi} miles · ${r.timeMin} min</div>
                <div style="font-size:11px;color:var(--muted);">${fmtDate(r.date)} · ${pace(r.distanceMi,r.timeMin)} avg pace</div>
              </div>
              <span style="font-size:14px;color:var(--blue);font-weight:800;">${r.distanceMi}</span>
            </div>`).join('')}
        </div>`:''}
      <div class="card">
        <div class="ct">Mobility Calendar (last 14 days)</div>
        ${mobCal()}
      </div>
    </div>`;
}

function weightChart(ws){
  const W=320,H=90,P=18;
  const vals=ws.map(w=>w.weight);
  const min=Math.min(...vals)-2,max=Math.max(...vals)+2;
  const xs=ws.map((_,i)=>P+(i/(ws.length-1||1))*(W-P*2));
  const ys=vals.map(v=>P+(1-(v-min)/(max-min||1))*(H-P*2));
  const path=xs.map((x,i)=>`${i===0?'M':'L'}${x},${ys[i]}`).join(' ');
  const area=`M${xs[0]},${H-P} ${xs.map((x,i)=>`L${x},${ys[i]}`).join(' ')} L${xs[xs.length-1]},${H-P} Z`;
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block;" preserveAspectRatio="none">
    <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF4D6D" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF4D6D" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#wg)"/>
    <path d="${path}" stroke="#FF4D6D" stroke-width="2" fill="none" stroke-linejoin="round"/>
    ${xs.map((x,i)=>`<circle cx="${x}" cy="${ys[i]}" r="3" fill="#FF4D6D"/>`).join('')}
  </svg>
  <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:3px;">
    <span>${fmtDate(ws[0].date)} · ${vals[0]} lbs</span><span>${fmtDate(ws[ws.length-1].date)} · ${vals[vals.length-1]} lbs</span>
  </div>`;
}

function mobCal(){
  const now=new Date();
  const days=[];
  for(let i=13;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);const ds=d.toISOString().slice(0,10);const m=S.d.mobility.find(x=>x.date===ds);days.push({ds,m});}
  return`<div style="display:flex;gap:5px;flex-wrap:wrap;">
    ${days.map(({ds,m})=>{const both=m&&m.morning&&m.evening;const done=m&&(m.morning||m.evening);return`<div style="flex:1;min-width:18px;aspect-ratio:1;border-radius:4px;background:${both?'var(--teal)':done?'rgba(45,212,191,0.4)':'#1a1a1a'};border:1px solid var(--border);" title="${ds}"></div>`;}).join('')}
  </div>
  <div style="font-size:10px;color:var(--muted);margin-top:6px;">Last 14 days · Bright teal = both sessions done</div>`;
}

// ─── MODALS ───
function renderModal(){
  const m=S.modal;
  let body='';
  if(m==='weight'){
    body=`<div class="mtitle">Log Weight</div>
      <div class="igroup"><label class="ilabel">Weight (lbs)</label><input class="input" type="number" id="m-w" placeholder="215" inputmode="decimal" step="0.1"></div>
      <button class="btn btn-p" data-save="weight">Save Weight</button>`;
  } else if(m==='run'){
    body=`<div class="mtitle">Log Run</div>
      <div class="igroup"><label class="ilabel">Distance (miles)</label><input class="input" type="number" id="m-dist" placeholder="1.5" inputmode="decimal" step="0.1"></div>
      <div class="igroup"><label class="ilabel">Time (minutes)</label><input class="input" type="number" id="m-time" placeholder="20" inputmode="decimal" step="1"></div>
      <button class="btn btn-p" style="background:var(--blue);color:#000;" data-save="run">Save Run</button>`;
  } else if(m==='workout'){
    const ph=PHASES[S.phase];
    body=`<div class="mtitle">Log Workout</div>
      <div class="igroup"><label class="ilabel">Select Workout Day</label>
        <div class="grid2" id="day-sel" style="margin-top:4px;">
          ${ph.days.map(d=>`<div class="dayopt" data-dp="${d.id}"><div style="font-size:13px;font-weight:700;">${d.name}</div><div style="font-size:11px;color:var(--muted);margin-top:2px;">${d.focus}</div></div>`).join('')}
        </div>
      </div>
      <button class="btn btn-p" data-save="workout">Save Workout</button>`;
  }
  return`<div class="modal" id="modal-ov">
    <div class="msheet"><div class="mhandle"></div>${body}<button class="btn btn-s" data-cm style="margin-bottom:0;">Cancel</button></div>
  </div>`;
}

// ─── EVENTS ───
function bind(){
  document.getElementById('app').addEventListener('click',e=>{
    const tab=e.target.closest('[data-tab]');
    if(tab){S.tab=tab.dataset.tab;render();return;}

    const pp=e.target.closest('[data-pp]');
    if(pp){S.pp=parseInt(pp.dataset.pp);render();return;}

    const tog=e.target.closest('[data-tog]');
    if(tog){const c=document.getElementById(tog.dataset.tog);if(c)c.classList.toggle('open');return;}

    const modal=e.target.closest('[data-modal]');
    if(modal){S.modal=modal.dataset.modal;selDay=null;render();return;}

    const cm=e.target.closest('[data-cm]');
    if(cm){S.modal=null;render();return;}

    const ov=e.target.id==='modal-ov';
    if(ov){S.modal=null;render();return;}

    const mob=e.target.closest('[data-mob]');
    if(mob){S.togMob(mob.dataset.mob);render();return;}

    const mt=e.target.closest('[data-mt]');
    if(mt){S.mt=mt.dataset.mt;render();return;}

    const mr=e.target.closest('[data-mr]');
    if(mr){S.mr=mr.dataset.mr;render();return;}

    const mobgo=e.target.closest('[data-mob-go]');
    if(mobgo){S.tab='mobility';render();return;}

    const qlog=e.target.closest('[data-qlog]');
    if(qlog){S.logWorkout(qlog.dataset.qlog);render();return;}

    const save=e.target.closest('[data-save]');
    if(save){
      const t=save.dataset.save;
      if(t==='weight'){
        const w=parseFloat(document.getElementById('m-w')?.value);
        if(isNaN(w)||w<50||w>999){alert('Please enter a valid weight.');return;}
        S.logW(w);
      }else if(t==='run'){
        const d=parseFloat(document.getElementById('m-dist')?.value);
        const ti=parseFloat(document.getElementById('m-time')?.value);
        if(isNaN(d)||isNaN(ti)||d<=0||ti<=0){alert('Please fill in distance and time.');return;}
        S.logRun(d,ti);
      }else if(t==='workout'){
        if(!selDay){alert('Please select a workout day.');return;}
        S.logWorkout(selDay);
      }
      S.modal=null;render();return;
    }

    const dp=e.target.closest('[data-dp]');
    if(dp){
      selDay=dp.dataset.dp;
      document.querySelectorAll('[data-dp]').forEach(d=>{
        d.classList.toggle('sel',d.dataset.dp===selDay);
      });
      return;
    }
  });
}

// ─── BOOT ───
S.load();
render();

// Register service worker
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
